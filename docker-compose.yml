services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - neko-net

  server:
    build: ./server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/neko-db
    depends_on:
      - mongo
    networks:
      - neko-net

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - neko-net

volumes:
  mongo_data:

networks:
  neko-net:
    driver: bridge
